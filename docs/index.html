<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0c0c0f;
  --surface:#16161a;
  --surface-2:#1e1e24;
  --border:rgba(255,255,255,.06);
  --text:#fafafa;
  --muted:#71717a;
  --accent:#6d5dfc;
  --accent-2:#b44dff;
  --green:#22c55e;
  --green-bg:rgba(34,197,94,.08);
  --red:#ef4444;
  --red-bg:rgba(239,68,68,.08);
  --gold:#f59e0b;
  /* Light decoder */
  --dec-bg:#ffffff;
  --dec-surface:#f8f8fa;
  --dec-border:#e4e4e7;
  --dec-text:#18181b;
  --dec-muted:#71717a;
  --key:#4f46e5;
  --str:#15803d;
  --num:#b45309;
  --bool:#7c3aed;
  --font:'Outfit',system-ui,sans-serif;
  --mono:'DM Mono','Fira Code',monospace;
}
html{font-size:16px}
body{background:var(--bg);color:var(--text);font-family:var(--font);overflow:hidden;height:100vh;width:100vw}

/* ─── LAYOUT: Full viewport, no scroll ─── */
.app{display:flex;flex-direction:column;height:100vh;width:100vw;overflow:hidden}

/* ─── HEADER ─── */
.header{
  display:flex;align-items:center;justify-content:space-between;
  padding:.6rem 1.5rem;background:var(--surface);border-bottom:1px solid var(--border);
  flex-shrink:0;z-index:10;
}
.logo{
  font-family:var(--mono);font-weight:500;font-size:1.6rem;
  background:linear-gradient(135deg,var(--accent),var(--accent-2));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  letter-spacing:-.03em;
}
.header-right{display:flex;align-items:center;gap:1rem}
.header-right a{color:var(--muted);font-size:.8rem;transition:color .2s;font-weight:500}
.header-right a:hover{color:var(--text);text-decoration:none}
.badge-row{display:flex;gap:.5rem;align-items:center}
.badge-row img{height:18px;opacity:.8;transition:opacity .2s}
.badge-row a:hover img{opacity:1}
.privacy-dot{width:6px;height:6px;border-radius:50%;background:var(--green);box-shadow:0 0 6px var(--green);animation:pulse 3s infinite}
@keyframes pulse{0%,100%{opacity:.5}50%{opacity:1}}

/* ─── MAIN SPLIT ─── */
.main{display:grid;grid-template-columns:1fr 1fr;flex:1;overflow:hidden}

/* ─── LEFT: ENCODED (dark) ─── */
.panel-left{
  display:flex;flex-direction:column;padding:1.5rem;
  background:var(--surface);border-right:1px solid var(--border);overflow:hidden;
}
.panel-label{
  font-size:.78rem;font-weight:600;color:var(--muted);text-transform:uppercase;
  letter-spacing:.1em;margin-bottom:.75rem;display:flex;align-items:center;gap:.5rem;
}
.panel-label span{font-family:var(--mono)}
.encoded-area{
  flex:1;width:100%;background:var(--bg);border:1px solid var(--border);
  border-radius:10px;color:var(--text);font-family:var(--mono);font-size:.92rem;
  padding:1.2rem;resize:none;outline:none;line-height:1.8;
  transition:border-color .3s,box-shadow .3s;
}
.encoded-area:focus{
  border-color:rgba(109,93,252,.4);
  box-shadow:0 0 0 3px rgba(109,93,252,.1),0 0 30px rgba(109,93,252,.05);
}
.encoded-area::placeholder{color:#3f3f46}
.pill-row{display:flex;gap:.4rem;flex-wrap:wrap;margin-top:.75rem}
.pill{
  cursor:pointer;background:var(--surface-2);border:1px solid var(--border);
  border-radius:100px;font-family:var(--font);font-size:.8rem;font-weight:500;
  padding:.4rem .9rem;color:var(--muted);transition:all .15s;
  display:flex;align-items:center;gap:.35rem;
}
.pill:hover{border-color:rgba(109,93,252,.4);color:var(--text);background:rgba(109,93,252,.08)}
.pill.active{border-color:var(--accent);color:#c4b5fd;background:rgba(109,93,252,.12)}
.pill-dot{width:5px;height:5px;border-radius:50%;flex-shrink:0}

/* ─── RIGHT: DECODED (light) ─── */
.panel-right{
  display:flex;flex-direction:column;overflow-y:auto;overflow-x:hidden;
  background:var(--dec-bg);color:var(--dec-text);
}
.decoded-header{
  padding:1rem 1.5rem .75rem;display:flex;align-items:center;justify-content:space-between;
  border-bottom:1px solid var(--dec-border);flex-shrink:0;
  background:var(--dec-bg);position:sticky;top:0;z-index:5;
}
.decoded-label{font-size:.7rem;font-weight:600;color:var(--dec-muted);text-transform:uppercase;letter-spacing:.12em}
.status-badges{display:flex;gap:.4rem;flex-wrap:wrap}
.alg-badge{
  font-family:var(--mono);font-size:.78rem;font-weight:500;
  padding:.3rem .75rem;border-radius:100px;
  background:rgba(79,70,229,.08);color:#4f46e5;border:1px solid rgba(79,70,229,.15);
}
.exp-badge{
  font-family:var(--mono);font-size:.78rem;font-weight:500;
  padding:.3rem .75rem;border-radius:100px;
}
.exp-badge.valid{background:var(--green-bg);color:var(--green);border:1px solid rgba(34,197,94,.2)}
.exp-badge.expired{background:var(--red-bg);color:var(--red);border:1px solid rgba(239,68,68,.2)}

.decoded-body{padding:.75rem 1.5rem 1.5rem;flex:1}

/* Section cards */
.section{
  background:var(--dec-surface);border:1px solid var(--dec-border);
  border-radius:10px;margin-bottom:.75rem;overflow:hidden;
  transition:box-shadow .2s;
}
.section:hover{box-shadow:0 2px 12px rgba(0,0,0,.04)}
.section.header-s{border-left:3px solid #6366f1}
.section.payload-s{border-left:3px solid #22c55e}
.section.sig-s{border-left:3px solid var(--gold)}

.section-top{
  display:flex;align-items:center;justify-content:space-between;
  padding:.6rem 1rem;border-bottom:1px solid var(--dec-border);
  background:rgba(0,0,0,.015);
}
.section-name{font-size:.85rem;font-weight:700;display:flex;align-items:center;gap:.5rem;color:var(--dec-text)}
.sec-dot{width:7px;height:7px;border-radius:50%;display:inline-block}
.sec-dot.blue{background:#6366f1}
.sec-dot.green{background:#22c55e}
.sec-dot.gold{background:var(--gold)}
.copy-btn{
  cursor:pointer;background:transparent;border:1px solid var(--dec-border);
  color:var(--dec-muted);padding:.3rem .7rem;font-size:.73rem;border-radius:6px;
  font-family:var(--font);font-weight:500;transition:all .15s;
}
.copy-btn:hover{border-color:#a1a1aa;color:var(--dec-text)}
.copy-btn.done{border-color:var(--green);color:var(--green)}

.section-content{padding:.75rem 1rem;overflow-x:auto}
pre{font-family:var(--mono);font-size:.88rem;line-height:2;white-space:pre-wrap;word-break:break-all;color:var(--dec-text)}
.json-key{color:var(--key);font-weight:500}
.json-str{color:var(--str)}
.json-num{color:var(--num)}
.json-bool{color:var(--bool)}
.json-ts{
  display:block;font-size:.76rem;color:var(--dec-muted);
  padding:.15rem 0 .15rem 1rem;margin:.1rem 0;
  border-left:2px solid rgba(109,93,252,.2);
  background:linear-gradient(90deg,rgba(109,93,252,.03),transparent);
}

/* Empty / error state */
.empty-state{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  height:100%;color:var(--dec-muted);text-align:center;padding:2rem;
}
.empty-icon{font-size:2.5rem;margin-bottom:.75rem;opacity:.4}
.empty-text{font-size:.9rem;line-height:1.5}
.error-state{
  background:var(--red-bg);border:1px solid rgba(239,68,68,.15);
  border-radius:8px;padding:.75rem 1rem;color:var(--red);font-size:.82rem;
  margin-bottom:.75rem;
}

/* ─── FOOTER BAR ─── */
.footer{
  display:flex;align-items:center;justify-content:space-between;
  padding:.4rem 1.5rem;background:var(--surface);border-top:1px solid var(--border);
  flex-shrink:0;font-size:.7rem;color:var(--muted);
}
.footer a{color:var(--muted);transition:color .15s}
.footer a:hover{color:var(--text);text-decoration:none}
.footer-links{display:flex;gap:1rem}
.footer-install{
  font-family:var(--mono);font-size:.68rem;color:#52525b;
  background:var(--bg);padding:.25rem .6rem;border-radius:6px;border:1px solid var(--border);
  cursor:pointer;transition:all .15s;
}
.footer-install:hover{border-color:rgba(109,93,252,.3);color:var(--text)}

/* ─── MOBILE ─── */
@media(max-width:768px){
  .main{grid-template-columns:1fr;grid-template-rows:1fr 1fr}
  body{overflow:auto}
  .app{height:auto;min-height:100vh}
  .badge-row{display:none}
  .panel-left,.panel-right{overflow:visible}
  .panel-left{border-right:none;border-bottom:1px solid var(--border)}
}
</style>
</head>
<body>
<div class="app">

  <!-- HEADER -->
  <header class="header">
    <div style="display:flex;align-items:center;gap:.75rem">
      <span class="logo">jwx</span>
      <span style="color:var(--muted);font-size:.7rem;font-weight:500">JWT Decoder</span>
    </div>
    <div class="header-right">
      <div class="badge-row">
        <a href="https://github.com/manimovassagh/jwx/actions/workflows/ci.yml"><img src="https://github.com/manimovassagh/jwx/actions/workflows/ci.yml/badge.svg" alt="CI"></a>
        <a href="https://github.com/manimovassagh/jwx/releases"><img src="https://img.shields.io/github/v/release/manimovassagh/jwx?style=flat-square&color=6d5dfc" alt="Release"></a>
      </div>
      <span class="privacy-dot" title="Client-side only"></span>
      <a href="https://github.com/manimovassagh/jwx">GitHub ↗</a>
    </div>
  </header>

  <!-- SPLIT PANES -->
  <div class="main">

    <!-- LEFT: Encoded JWT (dark) -->
    <div class="panel-left">
      <div class="panel-label"><span>Encoded</span> — paste or pick a sample</div>
      <textarea class="encoded-area" id="input" spellcheck="false" autocomplete="off" placeholder="Paste a JWT here..."></textarea>
      <div class="pill-row" id="pills"></div>
    </div>

    <!-- RIGHT: Decoded (light) -->
    <div class="panel-right">
      <div class="decoded-header">
        <span class="decoded-label">Decoded</span>
        <div class="status-badges" id="badges"></div>
      </div>
      <div class="decoded-body" id="output">
        <div class="empty-state" id="empty">
          <div class="empty-icon">🔑</div>
          <div class="empty-text">Paste a JWT on the left<br>or pick a sample below</div>
        </div>
      </div>
    </div>
  </div>

  <!-- FOOTER -->
  <footer class="footer">
    <div class="footer-links">
      <a href="https://github.com/manimovassagh/jwx">GitHub</a>
      <a href="https://github.com/manimovassagh/jwx/releases">Releases</a>
      <a href="https://github.com/manimovassagh/jwx/issues">Issues</a>
    </div>
    <button class="footer-install" onclick="copyInstall(this)" title="Click to copy">$ go install github.com/manimovassagh/jwx/cmd/jwx@latest</button>
    <div style="display:flex;align-items:center;gap:.4rem">
      <span class="privacy-dot"></span>
      <span>Tokens never leave your browser</span>
    </div>
  </footer>
</div>

<script>
var SAMPLES = {
  basic:{l:'Basic HS256',c:'#6366f1',t:'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJzdWIiOiIxMjM0NTY3ODkwIiwibmFtZSI6IkpvaG4gRG9lIiwiaWF0IjoxNTE2MjM5MDIyfQ.SflKxwRJSMeKKF2QT4fwpMeJf36POk6yJV_adQssw5c'},
  rich:{l:'RS256 + Claims',c:'#8b5cf6',t:'eyJhbGciOiJSUzI1NiIsInR5cCI6IkpXVCIsImtpZCI6ImFiYzEyMyJ9.eyJpc3MiOiJodHRwczovL2F1dGguZXhhbXBsZS5jb20iLCJzdWIiOiJ1c2VyXzQyIiwiYXVkIjoiYXBpLmV4YW1wbGUuY29tIiwibmFtZSI6Ik1hbmkgTW92YXNzYWdoIiwicm9sZSI6ImFkbWluIiwiaWF0IjoxNzEwNjAwMDAwLCJleHAiOjE5MDAwMDAwMDB9.fakesig'},
  expired:{l:'Expired',c:'#ef4444',t:'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJzdWIiOiIxMjM0NTY3ODkwIiwiZXhwIjoxNTE2MjM5MDIyfQ.4lKlMEaOmgSFB2ACmiTVsEL6L-5hAeTnjIPAhCMKBFE'},
  admin:{l:'Admin + Roles',c:'#22c55e',t:'eyJhbGciOiJFUzI1NiIsInR5cCI6IkpXVCJ9.eyJzdWIiOiJhZG1pbl8xIiwicm9sZXMiOlsiYWRtaW4iLCJzdXBlcl9hZG1pbiJdLCJwZXJtaXNzaW9ucyI6WyJyZWFkIiwid3JpdGUiLCJkZWxldGUiLCJtYW5hZ2VfdXNlcnMiXSwib3JnIjoiYWNtZS1jb3JwIiwiaWF0IjoxNzEwNjAwMDAwLCJleHAiOjE5MDAwMDAwMDB9.fakesig'},
  oauth:{l:'OAuth2',c:'#06b6d4',t:'eyJhbGciOiJSUzI1NiIsInR5cCI6ImF0K2p3dCIsImtpZCI6InNpZy0xIn0.eyJpc3MiOiJodHRwczovL2lkcC5leGFtcGxlLmNvbSIsInN1YiI6InVzZXJfNDIiLCJhdWQiOiJodHRwczovL2FwaS5leGFtcGxlLmNvbSIsImNsaWVudF9pZCI6IndlYi1hcHAiLCJzY29wZSI6Im9wZW5pZCBwcm9maWxlIGVtYWlsIiwiaWF0IjoxNzEwNjAwMDAwLCJleHAiOjE5MDAwMDAwMDAsImp0aSI6ImE4ZjVmMTY3LTRiMjMtNGE5OC1iN2M2LTlkZjJlMzQ1Njc4OSJ9.fakesig'}
};
var _h,_p,_s;

(function(){
  // Build pills
  var pc=document.getElementById('pills');
  Object.keys(SAMPLES).forEach(function(k){
    var s=SAMPLES[k],b=document.createElement('button');
    b.className='pill';b.setAttribute('data-key',k);
    var d=document.createElement('span');d.className='pill-dot';d.style.background=s.c;
    b.appendChild(d);b.appendChild(document.createTextNode(s.l));
    b.addEventListener('click',function(){pick(k)});
    pc.appendChild(b);
  });

  // Auto-decode
  var inp=document.getElementById('input');
  inp.addEventListener('input',decode);
  inp.addEventListener('paste',function(){setTimeout(decode,10)});

  // Load default token
  pick('rich');
})();

function pick(k){
  document.querySelectorAll('.pill').forEach(function(p){p.classList.toggle('active',p.getAttribute('data-key')===k)});
  document.getElementById('input').value=SAMPLES[k].t;
  decode();
}

function b64(s){
  s=s.replace(/-/g,'+').replace(/_/g,'/');
  while(s.length%4)s+='=';
  return decodeURIComponent(atob(s).split('').map(function(c){return'%'+('00'+c.charCodeAt(0).toString(16)).slice(-2)}).join(''));
}

function decode(){
  var raw=document.getElementById('input').value.trim();
  var out=document.getElementById('output');
  var badges=document.getElementById('badges');
  var empty=document.getElementById('empty');

  badges.textContent='';
  if(!raw){out.innerHTML='';out.appendChild(empty);empty.style.display='';return}
  if(empty)empty.style.display='none';

  if(raw.toLowerCase().indexOf('bearer ')===0)raw=raw.slice(7);
  var parts=raw.split('.');
  if(parts.length!==3){showErr(out,'Invalid JWT: expected 3 parts, got '+parts.length);return}

  var header,payload;
  try{header=JSON.parse(b64(parts[0]))}catch(e){showErr(out,'Bad header: '+e.message);return}
  try{payload=JSON.parse(b64(parts[1]))}catch(e){showErr(out,'Bad payload: '+e.message);return}

  _h=JSON.stringify(header,null,2);_p=JSON.stringify(payload,null,2);_s=parts[2];

  // Badges
  if(header.alg){var ab=document.createElement('span');ab.className='alg-badge';ab.textContent=header.alg;badges.appendChild(ab)}
  if(typeof payload.exp==='number'){
    var now=Math.floor(Date.now()/1000),eb=document.createElement('span');
    eb.className='exp-badge '+(payload.exp>now?'valid':'expired');
    eb.textContent=payload.exp>now?'Valid':'Expired';
    badges.appendChild(eb);
  }

  // Render sections
  out.textContent='';
  out.appendChild(makeSection('Header','header-s','blue',header,false));
  out.appendChild(makeSection('Payload','payload-s','green',payload,true));

  var sigSec=document.createElement('div');sigSec.className='section sig-s';
  var sigTop=document.createElement('div');sigTop.className='section-top';
  var sigName=document.createElement('span');sigName.className='section-name';
  var sigDot=document.createElement('span');sigDot.className='sec-dot gold';
  sigName.appendChild(sigDot);sigName.appendChild(document.createTextNode('Signature'));
  var sigCopy=document.createElement('button');sigCopy.className='copy-btn';sigCopy.textContent='Copy';
  sigCopy.onclick=function(){copyText(_s,sigCopy)};
  sigTop.appendChild(sigName);sigTop.appendChild(sigCopy);
  var sigBody=document.createElement('div');sigBody.className='section-content';
  var sigPre=document.createElement('pre');
  var sigSpan=document.createElement('span');sigSpan.className='json-str';sigSpan.textContent=parts[2];
  sigPre.appendChild(sigSpan);sigBody.appendChild(sigPre);
  sigSec.appendChild(sigTop);sigSec.appendChild(sigBody);
  out.appendChild(sigSec);
}

function makeSection(name,cls,dotCls,obj,timestamps){
  var sec=document.createElement('div');sec.className='section '+cls;
  var top=document.createElement('div');top.className='section-top';
  var nm=document.createElement('span');nm.className='section-name';
  var dot=document.createElement('span');dot.className='sec-dot '+dotCls;
  nm.appendChild(dot);nm.appendChild(document.createTextNode(name));
  var cb=document.createElement('button');cb.className='copy-btn';cb.textContent='Copy';
  var json=JSON.stringify(obj,null,2);
  cb.onclick=function(){copyText(json,cb)};
  top.appendChild(nm);top.appendChild(cb);

  var body=document.createElement('div');body.className='section-content';
  var pre=document.createElement('pre');
  renderJson(pre,obj,timestamps);
  body.appendChild(pre);
  sec.appendChild(top);sec.appendChild(body);
  return sec;
}

function renderJson(el,obj,ts){
  var json=JSON.stringify(obj,null,2);
  json.split('\n').forEach(function(line,i){
    if(i>0)el.appendChild(document.createTextNode('\n'));
    var kv=line.match(/^(\s*)"([^"]+)"\s*:\s*(.*)/);
    if(kv){
      el.appendChild(document.createTextNode(kv[1]));
      var k=document.createElement('span');k.className='json-key';k.textContent='"'+kv[2]+'"';
      el.appendChild(k);el.appendChild(document.createTextNode(': '));
      appendVal(el,kv[3]);
      if(ts&&/^"(exp|iat|nbf|auth_time)"/.test(line.trim())){
        var m=line.match(/"(exp|iat|nbf|auth_time)"\s*:\s*(\d+)/);
        if(m){var a=document.createElement('span');a.className='json-ts';a.textContent=fmtTs(m[1],+m[2]);el.appendChild(a)}
      }
    } else {
      var sv=line.match(/^(\s*)"([^"]*)"(,?)$/);
      if(sv){el.appendChild(document.createTextNode(sv[1]));var s=document.createElement('span');s.className='json-str';s.textContent='"'+sv[2]+'"';el.appendChild(s);if(sv[3])el.appendChild(document.createTextNode(sv[3]))}
      else el.appendChild(document.createTextNode(line));
    }
  });
}

function appendVal(el,v){
  v=v.trim();var trail='';if(v.endsWith(',')){trail=',';v=v.slice(0,-1)}
  var sp=document.createElement('span');
  if(v[0]==='"'&&v[v.length-1]==='"'){sp.className='json-str';sp.textContent=v}
  else if(/^-?\d+\.?\d*$/.test(v)){sp.className='json-num';sp.textContent=v}
  else if(v==='true'||v==='false'||v==='null'){sp.className='json-bool';sp.textContent=v}
  else{sp=null;el.appendChild(document.createTextNode(v))}
  if(sp)el.appendChild(sp);
  if(trail)el.appendChild(document.createTextNode(trail));
}

function showErr(out,msg){
  out.textContent='';
  var e=document.createElement('div');e.className='error-state';e.textContent=msg;
  out.appendChild(e);
}

function fmtTs(key,ts){
  var d=new Date(ts*1000),ds=d.toISOString().replace('T',' ').replace(/\.\d+Z$/,' UTC');
  var now=Math.floor(Date.now()/1000),diff=ts-now,r='';
  if(key==='exp'){r=diff>0?' ✓ Expires '+rel(diff):' ⚠ EXPIRED '+rel(-diff)+' ago'}
  else if(key==='iat'||key==='auth_time'){r=diff<=0?' '+rel(-diff)+' ago':''}
  else if(key==='nbf'){r=diff>0?' ⚠ Not valid for '+rel(diff):' ✓ Active'}
  return ds+r;
}
function rel(s){
  if(s<60)return s+'s';var m=Math.floor(s/60);if(m<60)return m+' min';
  var h=Math.floor(m/60);if(h<24)return h+' hr';var d=Math.floor(h/24);
  if(d<30)return d+' day'+(d>1?'s':'');if(d<365){var mo=Math.floor(d/30);return mo+' month'+(mo>1?'s':'')}
  var y=Math.floor(d/365);return y+' year'+(y>1?'s':'');
}

function copyText(t,btn){
  navigator.clipboard.writeText(t).then(function(){
    btn.textContent='Copied!';btn.classList.add('done');
    setTimeout(function(){btn.textContent='Copy';btn.classList.remove('done')},1200);
  });
}
function copyInstall(btn){
  navigator.clipboard.writeText('go install github.com/manimovassagh/jwx/cmd/jwx@latest').then(function(){
    var orig=btn.textContent;btn.textContent='Copied!';
    setTimeout(function(){btn.textContent=orig},1200);
  });
}
</script>
