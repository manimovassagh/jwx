version: 2
updates:
  - package-ecosystem: "gomod"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    commit-message:
      prefix: "deps"
    labels:
      - "dependencies"
    open-pull-requests-limit: 10
    reviewers:
      - "manimovassagh"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    commit-message:
      prefix: "ci"
    labels:
      - "ci"
    open-pull-requests-limit: 5
    reviewers:
      - "manimovassagh"

  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    commit-message:
      prefix: "docker"
    labels:
      - "dependencies"
    open-pull-requests-limit: 3

  - package-ecosystem: "npm"
    directory: "/docs"
    schedule:
      interval: "monthly"
    commit-message:
      prefix: "docs"
    labels:
      - "documentation"
    open-pull-requests-limit: 3
