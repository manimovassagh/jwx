version: 2

project_name: jwx

env:
  - GO111MODULE=on

gomod:
  proxy: true

builds:
  - main: ./cmd/jwx
    binary: jwx
    ldflags:
      - -s -w -X main.version={{.Version}} -X main.commit={{.Commit}} -X main.date={{.Date}}
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64

archives:
  - formats:
      - tar.gz
    name_template: "jwx_{{.Version}}_{{.Os}}_{{.Arch}}"
    format_overrides:
      - goos: windows
        formats:
          - zip

checksum:
  name_template: "checksums.txt"
  algorithm: sha256

brews:
  - repository:
      owner: manimovassagh
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    homepage: "https://github.com/manimovassagh/jwx"
    description: "A beautiful CLI for working with JSON Web Tokens"
    license: "MIT"
    skip_upload: true
    install: |
      bin.install "jwx"
    test: |
      system bin/"jwx", "version"

nfpms:
  - id: jwx
    package_name: jwx
    homepage: "https://github.com/manimovassagh/jwx"
    description: "A beautiful CLI for working with JSON Web Tokens"
    maintainer: "Mani Movassagh <mani@jwx.dev>"
    license: "MIT"
    formats:
      - deb
      - rpm
      - apk

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
      - "^chore:"

snapshot:
  version_template: "{{.Tag}}-next"
