version: 2

project_name: jwx

env:
  - GO111MODULE=on

gomod:
  proxy: true

builds:
  - main: ./cmd/jwx
    binary: jwx
    ldflags:
      - -s -w -X main.version={{.Version}} -X main.commit={{.Commit}} -X main.date={{.Date}}
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64

archives:
  - formats:
      - tar.gz
    name_template: "jwx_{{.Version}}_{{.Os}}_{{.Arch}}"
    format_overrides:
      - goos: windows
        formats:
          - zip

checksum:
  name_template: "checksums.txt"
  algorithm: sha256

brews:
  - repository:
      owner: manimovassagh
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    homepage: "https://github.com/manimovassagh/jwx"
    description: "A beautiful CLI for working with JSON Web Tokens"
    license: "MIT"
    skip_upload: false
    install: |
      bin.install "jwx"
    test: |
      system bin/"jwx", "version"

chocolateys:
  - name: jwx
    title: "jwx - JWT CLI Tool"
    authors: "Mani Movassagh"
    project_url: "https://github.com/manimovassagh/jwx"
    icon_url: "https://raw.githubusercontent.com/manimovassagh/jwx/main/docs/icon.png"
    copyright: "2026 Mani Movassagh"
    license_url: "https://github.com/manimovassagh/jwx/blob/main/LICENSE"
    require_license_acceptance: false
    project_source_url: "https://github.com/manimovassagh/jwx"
    docs_url: "https://github.com/manimovassagh/jwx#readme"
    bug_tracker_url: "https://github.com/manimovassagh/jwx/issues"
    tags: "jwt json cli security token decode encode sign verify"
    summary: "A beautiful CLI for working with JSON Web Tokens"
    description: |
      jwx is a beautiful CLI tool for working with JWTs — decode, encode,
      sign, verify, inspect, and more. Features colorized terminal output
      and security auditing.
    release_notes: "https://github.com/manimovassagh/jwx/releases/tag/v{{ .Version }}"
    api_key: "{{ .Env.CHOCOLATEY_API_KEY }}"
    source_repo: "https://push.chocolatey.org/"
    skip_publish: false
    goamd64: v1

nfpms:
  - id: jwx
    package_name: jwx
    homepage: "https://github.com/manimovassagh/jwx"
    description: "A beautiful CLI for working with JSON Web Tokens"
    maintainer: "Mani Movassagh <mani@jwx.dev>"
    license: "MIT"
    formats:
      - deb
      - rpm
      - apk

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
      - "^chore:"

snapshot:
  version_template: "{{.Tag}}-next"
