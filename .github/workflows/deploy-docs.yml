name: Deploy Documentation

on:
  push:
    branches: [main]
    paths:
      - 'website/**'
      - '.github/workflows/deploy-docs.yml'
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-deploy:
    name: Build and Deploy Docusaurus
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Install dependencies
        working-directory: website
        run: npm install

      - name: Build site
        working-directory: website
        run: npm run build
        env:
          NODE_ENV: production

      - name: Deploy to docs/docs directory
        run: |
          rm -rf docs/docs
          cp -r website/build docs/docs
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/docs
          git diff --cached --quiet || git commit -m "docs: update Docusaurus build"
          git push
