<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --font:'Outfit',system-ui,sans-serif;
  --mono:'DM Mono','Fira Code',monospace;
  --accent:#6d5dfc;
  --accent-2:#b44dff;
  --green:#22c55e;
  --red:#ef4444;
  --gold:#f59e0b;
}
/* ─── Dark theme (default) ─── */
:root,[data-theme="dark"]{
  --bg:#0c0c0f;
  --surface:#16161a;
  --surface-2:#1e1e24;
  --border:rgba(255,255,255,.08);
  --text:#fafafa;
  --muted:#a1a1aa;
  --green-bg:rgba(34,197,94,.1);
  --red-bg:rgba(239,68,68,.1);
  --dec-bg:#16161a;
  --dec-surface:#1e1e24;
  --dec-border:rgba(255,255,255,.08);
  --dec-text:#e4e4e7;
  --dec-muted:#a1a1aa;
  --key:#a5b4fc;
  --str:#86efac;
  --num:#fcd34d;
  --bool:#d8b4fe;
  --input-bg:#0c0c0f;
  --input-text:#fafafa;
  --input-placeholder:#71717a;
  --section-header-bg:rgba(255,255,255,.05);
  --copy-bg:transparent;
  --copy-border:rgba(255,255,255,.15);
  --copy-text:#b4b4bc;
  --alg-bg:rgba(109,93,252,.15);
  --alg-color:#a5b4fc;
  --alg-border:rgba(109,93,252,.25);
  --ts-border:rgba(109,93,252,.25);
  --ts-bg:rgba(109,93,252,.06);
}
/* ─── Light theme ─── */
[data-theme="light"]{
  --bg:#f4f5f7;
  --surface:#ffffff;
  --surface-2:#eef0f2;
  --border:#d1d5db;
  --text:#111827;
  --muted:#4b5563;
  --green-bg:rgba(34,197,94,.1);
  --red-bg:rgba(239,68,68,.1);
  --dec-bg:#ffffff;
  --dec-surface:#f8f9fa;
  --dec-border:#d1d5db;
  --dec-text:#111827;
  --dec-muted:#4b5563;
  --key:#3730a3;
  --str:#166534;
  --num:#92400e;
  --bool:#6d28d9;
  --input-bg:#eef0f2;
  --input-text:#111827;
  --input-placeholder:#6b7280;
  --section-header-bg:rgba(0,0,0,.03);
  --copy-bg:transparent;
  --copy-border:#9ca3af;
  --copy-text:#4b5563;
  --alg-bg:rgba(55,48,163,.1);
  --alg-color:#3730a3;
  --alg-border:rgba(55,48,163,.2);
  --ts-border:rgba(55,48,163,.3);
  --ts-bg:rgba(55,48,163,.06);
}
/* ─── prefers-color-scheme: auto light when no data-theme set (Issue #111, #139, #150) ─── */
@media (prefers-color-scheme: light) {
  :root:not([data-theme]) {
    --bg:#f4f5f7;
    --surface:#ffffff;
    --surface-2:#eef0f2;
    --border:#d1d5db;
    --text:#111827;
    --muted:#4b5563;
    --green-bg:rgba(34,197,94,.1);
    --red-bg:rgba(239,68,68,.1);
    --dec-bg:#ffffff;
    --dec-surface:#f8f9fa;
    --dec-border:#d1d5db;
    --dec-text:#111827;
    --dec-muted:#4b5563;
    --key:#3730a3;
    --str:#166534;
    --num:#92400e;
    --bool:#6d28d9;
    --input-bg:#eef0f2;
    --input-text:#111827;
    --input-placeholder:#6b7280;
    --section-header-bg:rgba(0,0,0,.03);
    --copy-bg:transparent;
    --copy-border:#9ca3af;
    --copy-text:#4b5563;
    --alg-bg:rgba(55,48,163,.1);
    --alg-color:#3730a3;
    --alg-border:rgba(55,48,163,.2);
    --ts-border:rgba(55,48,163,.3);
    --ts-bg:rgba(55,48,163,.06);
  }
}
.skip-link{position:absolute;top:-100%;left:0;background:var(--accent);color:#fff;padding:.5rem 1rem;z-index:100;border-radius:0 0 8px 0;font-size:.85rem;text-decoration:none;transition:top .2s}
.skip-link:focus{top:0}
html{font-size:16px}
body{background:var(--bg);color:var(--text);font-family:var(--font);overflow:hidden;height:100vh;width:100vw}

/* ─── Animations only when user has no reduced-motion preference (Issue #120) ─── */
@media (prefers-reduced-motion: no-preference) {
  body{transition:background .3s,color .3s}
  .header,.panel-left,.panel-right,.decoded-header,.section,.section-top,.footer,.encoded-area,.pill{transition:background .3s,border-color .3s,color .3s}
  .header-right a{transition:color .2s}
  .theme-toggle{transition:all .2s}
  .badge-row img{transition:opacity .2s}
  .privacy-dot{animation:pulse 3s infinite}
  @keyframes pulse{0%,100%{opacity:.5}50%{opacity:1}}
  .encoded-area{transition:border-color .3s,box-shadow .3s}
  .pill{transition:all .15s}
  .section{transition:box-shadow .2s}
  .copy-btn{transition:all .15s}
  .footer a{transition:color .15s}
  .footer-install{transition:all .15s}
}

/* ─── LAYOUT: Full viewport, no scroll ─── */
.app{display:flex;flex-direction:column;height:100vh;width:100vw;overflow:hidden}

/* ─── HEADER ─── */
.header{
  display:flex;align-items:center;justify-content:space-between;
  padding:.4rem 1.2rem;background:var(--surface);border-bottom:1px solid var(--border);
  flex-shrink:0;z-index:10;
}
.header-left{display:flex;align-items:center;gap:.75rem}
.header-subtitle{color:var(--muted);font-size:.7rem;font-weight:500}
.logo{
  font-family:var(--mono);font-weight:500;font-size:1.6rem;
  background:linear-gradient(135deg,var(--accent),var(--accent-2));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  letter-spacing:-.03em;
}
.header-right{display:flex;align-items:center;gap:1rem}
.header-right a{color:var(--muted);font-size:.8rem;font-weight:500}
.header-right a:hover{color:var(--text);text-decoration:none}
.theme-toggle{
  cursor:pointer;background:var(--surface-2);border:1px solid var(--border);
  border-radius:8px;width:32px;height:32px;display:flex;align-items:center;justify-content:center;
  font-size:.9rem;line-height:1;
}
.theme-toggle:hover{border-color:var(--accent);background:rgba(109,93,252,.1)}
.badge-row{display:flex;gap:.5rem;align-items:center}
.badge-row img{height:18px;opacity:.8}
.badge-row a:hover img{opacity:1}
.privacy-dot{width:6px;height:6px;border-radius:50%;background:var(--green);box-shadow:0 0 6px var(--green)}
.footer-privacy{display:flex;align-items:center;gap:.4rem}

/* ─── Focus-visible styles ─── */
.pill:focus-visible,.copy-btn:focus-visible,.theme-toggle:focus-visible,.footer-install:focus-visible{
  outline:2px solid var(--accent);outline-offset:2px;
}

/* ─── MAIN SPLIT ─── */
.main{display:grid;grid-template-columns:1fr 1fr;flex:1;overflow:hidden}

/* ─── LEFT: ENCODED ─── */
.panel-left{
  display:flex;flex-direction:column;padding:1rem 1.2rem;
  background:var(--surface);border-right:1px solid var(--border);overflow:hidden;
}
.panel-label{
  font-size:.78rem;font-weight:600;color:var(--muted);text-transform:uppercase;
  letter-spacing:.1em;margin-bottom:.75rem;display:flex;align-items:center;gap:.5rem;
}
.panel-label span{font-family:var(--mono)}
/* Overlay container for colored highlight behind transparent textarea */
.encoded-wrap{
  position:relative;flex:1;width:100%;min-height:0;display:flex;
}
.encoded-highlight{
  position:absolute;top:0;left:0;right:0;bottom:0;
  background:var(--input-bg);border:1px solid transparent;
  border-radius:10px;font-family:var(--mono);font-size:.92rem;
  padding:1.2rem;line-height:1.8;
  white-space:pre-wrap;word-break:break-all;
  overflow:auto;pointer-events:none;
  color:transparent;
}
.encoded-highlight .jwt-header{color:#6366f1}
.encoded-highlight .jwt-dot{color:var(--muted)}
.encoded-highlight .jwt-payload{color:#22c55e}
.encoded-highlight .jwt-sig{color:#f59e0b}
.encoded-area{
  position:relative;z-index:1;
  flex:1;width:100%;background:transparent;border:1px solid var(--border);
  border-radius:10px;color:transparent;caret-color:var(--input-text);
  font-family:var(--mono);font-size:.92rem;
  padding:1.2rem;resize:none;outline:none;line-height:1.8;
}
.encoded-area:focus{
  border-color:rgba(109,93,252,.4);
  box-shadow:0 0 0 3px rgba(109,93,252,.1),0 0 30px rgba(109,93,252,.05);
}
.encoded-area::placeholder{color:var(--input-placeholder)}
.encoded-area.flash{border-color:var(--accent)!important;box-shadow:0 0 0 3px rgba(109,93,252,.25)!important}
/* When textarea is empty, show placeholder (needs non-transparent text for placeholder) */
.encoded-area:placeholder-shown{color:transparent}
.pill-row{display:flex;gap:.4rem;flex-wrap:wrap;margin-top:.75rem}
.pill{
  cursor:pointer;background:var(--surface-2);border:1px solid var(--border);
  border-radius:100px;font-family:var(--font);font-size:.8rem;font-weight:500;
  padding:.4rem .9rem;color:var(--muted);
  display:flex;align-items:center;gap:.35rem;
}
.pill:hover{border-color:rgba(109,93,252,.4);color:var(--text);background:rgba(109,93,252,.08)}
.pill.active{border-color:var(--accent);color:var(--alg-color);background:var(--alg-bg)}
.pill-dot{width:5px;height:5px;border-radius:50%;flex-shrink:0}

/* ─── RIGHT: DECODED ─── */
.panel-right{
  display:flex;flex-direction:column;overflow-y:auto;overflow-x:hidden;
  background:var(--dec-bg);color:var(--dec-text);
}
.decoded-header{
  padding:.5rem 1.2rem .4rem;display:flex;align-items:center;justify-content:space-between;
  border-bottom:1px solid var(--dec-border);flex-shrink:0;
  background:var(--dec-bg);position:sticky;top:0;z-index:5;
}
.decoded-label{font-size:.7rem;font-weight:600;color:var(--dec-muted);text-transform:uppercase;letter-spacing:.12em}
.status-badges{display:flex;gap:.4rem;flex-wrap:wrap}
.alg-badge{
  font-family:var(--mono);font-size:.78rem;font-weight:500;
  padding:.3rem .75rem;border-radius:100px;
  background:var(--alg-bg);color:var(--alg-color);border:1px solid var(--alg-border);
}
.exp-badge{
  font-family:var(--mono);font-size:.78rem;font-weight:500;
  padding:.3rem .75rem;border-radius:100px;
}
.exp-badge.valid{background:var(--green-bg);color:var(--green);border:1px solid rgba(34,197,94,.2)}
.exp-badge.expired{background:var(--red-bg);color:var(--red);border:1px solid rgba(239,68,68,.2)}

.decoded-body{padding:.75rem 1.2rem;flex:1}

/* Section cards */
.section{
  background:var(--dec-surface);border:1px solid var(--dec-border);
  border-radius:8px;margin-bottom:.6rem;overflow:hidden;
}
.section:hover{box-shadow:0 2px 12px rgba(0,0,0,.04)}
.section.header-s{border-left:3px solid #6366f1}
.section.payload-s{border-left:3px solid #22c55e}
.section.sig-s{border-left:3px solid var(--gold)}
.section.security-s{border-left:3px solid #ef4444}
.section.security-s.sev-high{border-left-color:#f97316}
.section.security-s.sev-medium{border-left-color:#eab308}
.section.security-s.sev-low{border-left-color:#3b82f6}
.section.security-s.sev-info{border-left-color:#6b7280}

.security-toggle{cursor:pointer;user-select:none;display:flex;align-items:center;gap:.5rem;flex:1;background:none;border:none;font:inherit;padding:0;color:inherit}
.security-toggle:focus-visible{outline:2px solid var(--accent);outline-offset:2px}
.sec-arrow{font-size:.6rem;display:inline-block}
@media (prefers-reduced-motion: no-preference){.sec-arrow{transition:transform .2s}}
.sec-arrow.open{transform:rotate(90deg)}
.security-count{
  font-size:.65rem;font-weight:600;padding:.15rem .5rem;border-radius:100px;
  background:rgba(239,68,68,.12);color:#ef4444;font-family:var(--mono);
}
.security-count.sev-high{background:rgba(249,115,22,.12);color:#f97316}
.security-count.sev-medium{background:rgba(234,179,8,.12);color:#eab308}
.security-count.sev-low{background:rgba(59,130,246,.12);color:#3b82f6}
.security-count.sev-info{background:rgba(107,114,128,.12);color:#6b7280}

.security-list{list-style:none;padding:0;margin:0}
.security-item{
  display:flex;align-items:flex-start;gap:.6rem;padding:.45rem .9rem;
  border-bottom:1px solid var(--dec-border);font-size:.82rem;line-height:1.5;
}
.security-item:last-child{border-bottom:none}
.security-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-top:.35rem}
.security-dot.critical{background:#ef4444}
.security-dot.high{background:#f97316}
.security-dot.medium{background:#eab308}
.security-dot.low{background:#3b82f6}
.security-dot.info{background:#6b7280}
.security-text{display:flex;flex-direction:column;gap:.1rem}
.security-title{font-weight:600;color:var(--dec-text)}
.security-desc{color:var(--dec-muted);font-size:.78rem}

.section-top{
  display:flex;align-items:center;justify-content:space-between;
  padding:.35rem .8rem;border-bottom:1px solid var(--dec-border);
  background:var(--section-header-bg);
}
.section-name{font-size:.85rem;font-weight:700;display:flex;align-items:center;gap:.5rem;color:var(--dec-text)}
.sec-dot{width:7px;height:7px;border-radius:50%;display:inline-block}
.sec-dot.blue{background:#6366f1}
.sec-dot.green{background:#22c55e}
.sec-dot.gold{background:var(--gold)}
.copy-btn{
  cursor:pointer;background:var(--copy-bg);border:1px solid var(--copy-border);
  color:var(--copy-text);padding:.3rem .7rem;font-size:.73rem;border-radius:6px;
  font-family:var(--font);font-weight:500;
}
.copy-btn:hover{border-color:#a1a1aa;color:var(--dec-text)}
.copy-btn.done{border-color:var(--green);color:var(--green)}

.section-content{padding:.5rem .9rem;overflow-x:auto}
pre{font-family:var(--mono);font-size:.85rem;line-height:1.65;white-space:pre-wrap;word-break:break-all;color:var(--dec-text)}
.json-key{color:var(--key);font-weight:500}
.json-str{color:var(--str)}
.json-num{color:var(--num)}
.json-bool{color:var(--bool)}
.json-ts{
  display:block;font-size:.72rem;color:var(--dec-muted);
  padding:.1rem 0 .1rem .8rem;margin:0;
  border-left:2px solid var(--ts-border);
  background:linear-gradient(90deg,var(--ts-bg),transparent);
}

/* ─── Verify Signature section ─── */
.verify-section{
  background:var(--dec-surface);border:1px solid var(--dec-border);
  border-radius:8px;margin-bottom:.6rem;overflow:hidden;border-left:3px solid var(--gold);
}
.verify-section:hover{box-shadow:0 2px 12px rgba(0,0,0,.04)}
.verify-toggle{
  display:flex;align-items:center;justify-content:space-between;
  padding:.35rem .8rem;border:none;background:var(--section-header-bg);
  width:100%;cursor:pointer;border-bottom:1px solid transparent;color:var(--dec-text);
  font-family:var(--font);
}
.verify-toggle[aria-expanded="true"]{border-bottom-color:var(--dec-border)}
.verify-toggle-left{display:flex;align-items:center;gap:.5rem;font-size:.85rem;font-weight:700}
.verify-chevron{font-size:.7rem;color:var(--dec-muted)}
.verify-toggle[aria-expanded="true"] .verify-chevron{transform:rotate(90deg)}
.verify-body{display:none;padding:.6rem .9rem}
.verify-body.open{display:block}
.verify-algo-hint{font-size:.75rem;color:var(--dec-muted);margin-bottom:.5rem;font-family:var(--mono)}
.verify-input{
  width:100%;background:var(--input-bg);border:1px solid var(--border);
  border-radius:8px;color:var(--input-text);font-family:var(--mono);font-size:.85rem;
  padding:.6rem .8rem;resize:vertical;outline:none;
}
.verify-input:focus{border-color:rgba(109,93,252,.4);box-shadow:0 0 0 3px rgba(109,93,252,.1)}
.verify-input::placeholder{color:var(--input-placeholder)}
.verify-actions{display:flex;align-items:center;gap:.75rem;margin-top:.5rem}
.verify-btn{
  cursor:pointer;background:var(--gold);color:#000;border:none;
  border-radius:8px;font-family:var(--font);font-size:.82rem;font-weight:600;
  padding:.45rem 1.1rem;
}
.verify-btn:hover{opacity:.9}
.verify-btn:focus-visible{outline:2px solid var(--accent);outline-offset:2px}
.verify-result{font-size:.82rem;font-weight:600;display:flex;align-items:center;gap:.35rem}
.verify-result.valid{color:var(--green)}
.verify-result.invalid{color:var(--red)}
.verify-privacy{font-size:.68rem;color:var(--dec-muted);margin-top:.45rem;display:flex;align-items:center;gap:.35rem}
.verify-privacy .privacy-dot{width:5px;height:5px}
@media (prefers-reduced-motion: no-preference) {
  .verify-chevron{transition:transform .2s}
  .verify-btn{transition:opacity .15s}
}
/* ─── Claim explanation tooltips ─── */
.claim-tip{position:relative;cursor:help}
.claim-tip:hover{text-decoration:underline;text-decoration-style:dotted;text-underline-offset:3px}
.claim-tip::after{
  content:attr(data-tip);
  position:absolute;bottom:calc(100% + 8px);left:50%;transform:translateX(-50%);
  background:#1e1e24;color:#e4e4e7;font-family:var(--font);font-size:.72rem;font-weight:400;
  line-height:1.4;white-space:normal;max-width:250px;width:max-content;
  padding:.4rem .65rem;border-radius:6px;
  pointer-events:none;opacity:0;z-index:20;
  box-shadow:0 4px 12px rgba(0,0,0,.3);
}
.claim-tip::before{
  content:'';position:absolute;bottom:calc(100% + 2px);left:50%;transform:translateX(-50%);
  border:5px solid transparent;border-top-color:#1e1e24;
  pointer-events:none;opacity:0;z-index:20;
}
.claim-tip:hover::after,.claim-tip:hover::before{opacity:1}
@media (prefers-reduced-motion: no-preference) {
  .claim-tip::after,.claim-tip::before{transition:opacity .15s}
}

/* Empty / error state */
.empty-state{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  height:100%;color:var(--dec-muted);text-align:center;padding:2rem;
}
.empty-icon{font-size:2.5rem;margin-bottom:.75rem;opacity:.4}
.empty-text{font-size:.9rem;line-height:1.5}
.error-state{
  background:var(--red-bg);border:1px solid rgba(239,68,68,.15);
  border-radius:8px;padding:.75rem 1rem;color:var(--red);font-size:.82rem;
  margin-bottom:.75rem;
}

/* ─── FOOTER BAR ─── */
.footer{
  display:flex;align-items:center;justify-content:space-between;
  padding:.3rem 1.2rem;background:var(--surface);border-top:1px solid var(--border);
  flex-shrink:0;font-size:.7rem;color:var(--muted);
}
.footer a{color:var(--muted)}
.footer a:hover{color:var(--text);text-decoration:none}
.footer-links{display:flex;gap:1rem}
.footer-install{
  font-family:var(--mono);font-size:.68rem;color:var(--muted);
  background:var(--bg);padding:.25rem .6rem;border-radius:6px;border:1px solid var(--border);
  cursor:pointer;
}
.footer-install:hover{border-color:rgba(109,93,252,.3);color:var(--text)}

/* ─── MOBILE ─── */
@media(max-width:768px){
  .main{grid-template-columns:1fr;grid-template-rows:1fr 1fr}
  body{overflow:auto}
  .app{height:auto;min-height:100vh}
  .badge-row{display:none}
  .panel-left,.panel-right{overflow:visible}

function b64(s){

}

function decode(){
  var raw=document.getElementById('input').value.trim();

  if(raw.toLowerCase().indexOf('bearer ')===0)raw=raw.slice(7);

  if(raw.length>100000){showErr(out,'Token too large. Maximum 100KB.');return}

  var parts=raw.split('.');
  if(parts.length!==3){showErr(out,'Invalid JWT: expected 3 parts, got '+parts.length);return}

  var header,payload;
  try{header=JSON.parse(b64(parts[0]))}catch(e){showErr(out,'Could not decode header. Check that this is a valid JWT.');return}
  try{payload=JSON.parse(b64(parts[1]))}catch(e){showErr(out,'Could not decode payload. The token may be corrupted.');return}

  // JWT format validation: header and payload must be non-null, non-array objects (Issue #157)
  if(typeof header!=='object'||header===null||Array.isArray(header)){showErr(out,'Invalid JWT: header must be a JSON object.');return}
  if(typeof payload!=='object'||payload===null||Array.isArray(payload)){showErr(out,'Invalid JWT: payload must be a JSON object.');return}

function makeSection(name,cls,dotCls,obj,timestamps){

function renderJson(el,obj,ts){
  var json=JSON.stringify(obj,null,2);
  json.split('\n').forEach(function(line,i){
    if(i>0)el.appendChild(document.createTextNode('\n'));

function appendVal(el,v){
  v=v.trim();var trail='';if(v.endsWith(',')){trail=',';v=v.slice(0,-1)}
  var sp=document.createElement('span');
  if(v[0]==='"'&&v[v.length-1]==='"'){sp.className='json-str';sp.textContent=v}
  else if(/^-?\d+\.?\d*$/.test(v)){sp.className='json-num';sp.textContent=v}
  else if(v==='true'||v==='false'||v==='null'){sp.className='json-bool';sp.textContent=v}
  else{sp=null;el.appendChild(document.createTextNode(v))}
  if(sp)el.appendChild(sp);
  if(trail)el.appendChild(document.createTextNode(trail));
}

/* \u2500\u2500\u2500 JWT Security Linter (Issue #3) \u2500\u2500\u2500 */
function lintJwt(header,payload,rawToken){
  var findings=[];
  var now=Math.floor(Date.now()/1000);

  // CRITICAL: alg none
  if(!header.alg||header.alg.toLowerCase()==='none'){
    findings.push({sev:'critical',title:'Algorithm "none"',desc:'Token has no signature algorithm \u2014 anyone can forge it.'});
  }

  // CRITICAL: missing exp
  if(typeof payload.exp!=='number'){
    findings.push({sev:'critical',title:'Missing "exp" claim',desc:'Token never expires. An attacker with a stolen token has unlimited access.'});
  }

  // HIGH: expired token
  if(typeof payload.exp==='number'&&payload.exp<now){
    findings.push({sev:'high',title:'Token is expired',desc:'The "exp" timestamp is in the past. This token should be rejected.'});
  }

  // HIGH: HS256 with common test secret (sample token check)
  if(header.alg==='HS256'&&rawToken&&SAMPLE_TOKENS[rawToken]){
    findings.push({sev:'high',title:'Weak/test secret suspected',desc:'This HS256 token matches a well-known sample. Never use test secrets in production.'});
  }

  // MEDIUM: missing iss
  if(payload.iss===undefined){
    findings.push({sev:'medium',title:'Missing "iss" (issuer)',desc:'No issuer claim \u2014 cannot verify who created this token.'});
  }

  // MEDIUM: missing aud
  if(payload.aud===undefined){
    findings.push({sev:'medium',title:'Missing "aud" (audience)',desc:'No audience claim \u2014 token could be replayed to unintended services.'});
  }

  // MEDIUM: missing sub
  if(payload.sub===undefined){
    findings.push({sev:'medium',title:'Missing "sub" (subject)',desc:'No subject claim \u2014 the token does not identify a principal.'});
  }

  // LOW: missing jti
  if(payload.jti===undefined){
    findings.push({sev:'low',title:'Missing "jti" (JWT ID)',desc:'No unique token ID \u2014 no replay protection.'});
  }

  // LOW: missing nbf
  if(payload.nbf===undefined){
    findings.push({sev:'low',title:'Missing "nbf" (not before)',desc:'No "not before" constraint \u2014 token is valid immediately upon issue.'});
  }

  // INFO: iat in the future
  if(typeof payload.iat==='number'&&payload.iat>now){
    findings.push({sev:'info',title:'Issued in the future',desc:'The "iat" timestamp is ahead of current time \u2014 possible clock skew.'});
  }

  // INFO: exp very far in the future (> 1 year)
  if(typeof payload.exp==='number'&&payload.exp>now&&(payload.exp-now)>365*24*3600){
    findings.push({sev:'info',title:'Very long expiry',desc:'Token expires more than 1 year from now. Consider shorter lifetimes.'});
  }

  // INFO: large payload (> 50 claims)
  var claimCount=Object.keys(payload).length;
  if(claimCount>50){
    findings.push({sev:'info',title:'Large payload ('+claimCount+' claims)',desc:'Tokens with many claims may indicate over-scoping or misuse as a data store.'});
  }

  return findings;
}

  var sec=document.createElement('div');

  var shieldText=document.createTextNode('🛡️ Security');

  var badge=document.createElement('span');
  badge.className='security-count'+(highest!=='critical'?' sev-'+highest:'');

  top.appendChild(toggle);

  var body=document.createElement('div');body.className='section-content';body.style.padding='0';
  var list=document.createElement('ul');list.className='security-list';
  list.setAttribute('role','list');

  findings.forEach(function(f){
    var li=document.createElement('li');li.className='security-item';
    var dot=document.createElement('span');dot.className='security-dot '+f.sev;
    var txt=document.createElement('div');txt.className='security-text';
    var title=document.createElement('span');title.className='security-title';title.textContent=f.title;
    var desc=document.createElement('span');desc.className='security-desc';desc.textContent=f.desc;
    txt.appendChild(title);txt.appendChild(desc);
    li.appendChild(dot);li.appendChild(txt);
    list.appendChild(li);
  });

  body.appendChild(list);
  sec.appendChild(top);sec.appendChild(body);

  // Collapse/expand toggle
  toggle.addEventListener('click',function(){
    var expanded=toggle.getAttribute('aria-expanded')==='true';
    toggle.setAttribute('aria-expanded',expanded?'false':'true');
    arrow.classList.toggle('open',!expanded);
    body.style.display=expanded?'none':'';
  });

  return sec;
}

function showErr(out,msg){
  while(out.firstChild)out.removeChild(out.firstChild);
  var e=document.createElement('div');e.className='error-state';e.textContent=msg;
  out.appendChild(e);
}

function fmtTs(key,ts){
  var d=new Date(ts*1000),ds=d.toISOString().replace('T',' ').replace(/\.\d+Z$/,' UTC');
  var now=Math.floor(Date.now()/1000),diff=ts-now,r='';
  if(key==='exp'){r=diff>0?' ✓ Expires '+rel(diff):' ⚠ EXPIRED '+rel(-diff)+' ago'}
  else if(key==='iat'||key==='auth_time'){r=diff<=0?' '+rel(-diff)+' ago':''}
  else if(key==='nbf'){r=diff>0?' ⚠ Not valid for '+rel(diff):' ✓ Active'}
  return ds+r;
}
function rel(s){
  if(s<60)return s+'s';var m=Math.floor(s/60);if(m<60)return m+' min';
  var h=Math.floor(m/60);if(h<24)return h+' hr';var d=Math.floor(h/24);
  if(d<30)return d+' day'+(d>1?'s':'');if(d<365){var mo=Math.floor(d/30);return mo+' month'+(mo>1?'s':'')}
  var y=Math.floor(d/365);return y+' year'+(y>1?'s':'');
}

/* ─── Clipboard with fallback (Issue #6 from security audit) ─── */
function copyText(t,btn){
  try{
    navigator.clipboard.writeText(t).then(function(){
      btn.textContent='Copied!';btn.classList.add('done');
      setTimeout(function(){btn.textContent='Copy';btn.classList.remove('done')},1200);
    },function(){
      copyFallback(t,btn);
    });
  }catch(e){
    copyFallback(t,btn);
  }
}
function copyFallback(t,btn){
  try{
    var ta=document.createElement('textarea');
    ta.value=t;ta.style.position='fixed';ta.style.left='-9999px';
    document.body.appendChild(ta);ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    btn.textContent='Copied!';btn.classList.add('done');
    setTimeout(function(){btn.textContent='Copy';btn.classList.remove('done')},1200);
  }catch(e){
    btn.textContent='Failed';
    setTimeout(function(){btn.textContent='Copy'},1200);
  }
}

function toggleTheme(){
  var html=document.documentElement;
  var current=html.getAttribute('data-theme')||getOsTheme();
  var next=current==='dark'?'light':'dark';
  html.setAttribute('data-theme',next);
  document.getElementById('theme-btn').textContent=next==='dark'?'☀️':'🌙';
  try{localStorage.setItem('jwx-theme',next)}catch(e){}
}

(function(){
  try{
    var saved=localStorage.getItem('jwx-theme');
    if(saved){
      document.documentElement.setAttribute('data-theme',saved);
      document.getElementById('theme-btn').textContent=saved==='dark'?'☀️':'🌙';
    } else {
      // No saved preference — check OS preference (Issue #111, #139, #150)
      var os=getOsTheme();
      // Don't set data-theme so CSS @media prefers-color-scheme applies
      document.getElementById('theme-btn').textContent=os==='dark'?'☀️':'🌙';
    }
  }catch(e){}
})();

/* ─── Signature Verification (Issue #2) ─── */
function makeVerifySection(alg,rawToken){
  var sec=document.createElement('div');sec.className='verify-section';
  var toggle=document.createElement('button');toggle.className='verify-toggle';
  toggle.setAttribute('aria-expanded','false');
  var left=document.createElement('span');left.className='verify-toggle-left';
  var dot=document.createElement('span');dot.className='sec-dot gold';
  var chevron=document.createElement('span');chevron.className='verify-chevron';chevron.textContent='\u25B6';
  left.appendChild(dot);left.appendChild(document.createTextNode('Verify Signature'));
  toggle.appendChild(left);toggle.appendChild(chevron);
  sec.appendChild(toggle);

  var body=document.createElement('div');body.className='verify-body';

  var isHmac=/^HS(256|384|512)$/.test(alg);
  var isRsa=/^RS(256|384|512)$/.test(alg);
  var isEc=/^ES(256|384|512)$/.test(alg);
  var supported=isHmac||isRsa||isEc;

  var hint=document.createElement('div');hint.className='verify-algo-hint';
  if(!supported){hint.textContent='Algorithm '+alg+' is not supported for verification';body.appendChild(hint);sec.appendChild(body);toggle.addEventListener('click',function(){var exp=toggle.getAttribute('aria-expanded')==='true';toggle.setAttribute('aria-expanded',exp?'false':'true');body.classList.toggle('open')});return sec}
  hint.textContent=alg+' — '+(isHmac?'Enter shared secret':'Paste public key (PEM, SPKI format)');
  body.appendChild(hint);

  var input;
  if(isHmac){
    input=document.createElement('input');input.type='text';input.className='verify-input';
    input.placeholder='Enter HMAC secret...';input.setAttribute('aria-label','HMAC shared secret');
  } else {
    input=document.createElement('textarea');input.className='verify-input';input.rows=4;
    input.placeholder='-----BEGIN PUBLIC KEY-----\n...\n-----END PUBLIC KEY-----';
    input.setAttribute('aria-label','Public key in PEM format');
  }
  body.appendChild(input);

  var actions=document.createElement('div');actions.className='verify-actions';
  var btn=document.createElement('button');btn.className='verify-btn';btn.textContent='Verify';
  var result=document.createElement('span');result.className='verify-result';
  actions.appendChild(btn);actions.appendChild(result);
  body.appendChild(actions);

  var privacy=document.createElement('div');privacy.className='verify-privacy';
  var pDot=document.createElement('span');pDot.className='privacy-dot';
  privacy.appendChild(pDot);privacy.appendChild(document.createTextNode('Verification happens locally \u2014 your key never leaves this page'));
  body.appendChild(privacy);
  sec.appendChild(body);

  toggle.addEventListener('click',function(){
    var exp=toggle.getAttribute('aria-expanded')==='true';
    toggle.setAttribute('aria-expanded',exp?'false':'true');
    body.classList.toggle('open');
  });

  btn.addEventListener('click',function(){
    result.className='verify-result';result.textContent='Verifying...';
    var keyVal=input.value;
    if(!keyVal.trim()){result.className='verify-result invalid';result.textContent='\u2717 Please enter a '+(isHmac?'secret':'public key');return}
    verifyJwt(alg,rawToken,keyVal).then(function(valid){
      if(valid){result.className='verify-result valid';result.textContent='\u2713 Signature is valid'}
      else{result.className='verify-result invalid';result.textContent='\u2717 Invalid signature'}
    }).catch(function(err){
      result.className='verify-result invalid';result.textContent='\u2717 Error: '+(err.message||'Verification failed');
    });
  });

  return sec;
}

function b64UrlDecode(s){
  s=s.replace(/-/g,'+').replace(/_/g,'/');
  while(s.length%4)s+='=';
  var bin=atob(s),arr=new Uint8Array(bin.length);
  for(var i=0;i<bin.length;i++)arr[i]=bin.charCodeAt(i);
  return arr;
}

function pemToArrayBuffer(pem){
  var lines=pem.trim().split('\n');
  var b64='';
  for(var i=0;i<lines.length;i++){
    var line=lines[i].trim();
    if(line.indexOf('-----')===0)continue;
    b64+=line;
  }
  var bin=atob(b64),arr=new Uint8Array(bin.length);
  for(var i=0;i<bin.length;i++)arr[i]=bin.charCodeAt(i);
  return arr.buffer;
}

function getAlgoParams(alg){
  var hash={'256':'SHA-256','384':'SHA-384','512':'SHA-512'}[alg.slice(2)];
  if(alg.indexOf('HS')===0)return{import:{name:'HMAC',hash:hash},sign:{name:'HMAC'}};
  if(alg.indexOf('RS')===0)return{import:{name:'RSASSA-PKCS1-v1_5',hash:hash},verify:{name:'RSASSA-PKCS1-v1_5'}};
  if(alg.indexOf('ES')===0){
    var namedCurve={'256':'P-256','384':'P-384','512':'P-521'}[alg.slice(2)];
    return{import:{name:'ECDSA',namedCurve:namedCurve},verify:{name:'ECDSA',hash:hash}};
  }
  return null;
}

function verifyJwt(alg,rawToken,keyVal){
  var parts=rawToken.split('.');
  var signInput=parts[0]+'.'+parts[1];
  var signatureBytes=b64UrlDecode(parts[2]);
  var enc=new TextEncoder();
  var data=enc.encode(signInput);
  var params=getAlgoParams(alg);
  if(!params)return Promise.reject(new Error('Unsupported algorithm'));

  if(alg.indexOf('HS')===0){
    var keyBytes=enc.encode(keyVal);
    return crypto.subtle.importKey('raw',keyBytes,params.import,false,['sign']).then(function(key){
      return crypto.subtle.sign(params.sign,key,data);
    }).then(function(sig){
      var expected=new Uint8Array(sig);
      if(expected.length!==signatureBytes.length)return false;
      var match=true;
      for(var i=0;i<expected.length;i++){if(expected[i]!==signatureBytes[i])match=false}
      return match;
    });
  }

  // RSA or ECDSA — import PEM public key
  var keyBuffer=pemToArrayBuffer(keyVal);
  return crypto.subtle.importKey('spki',keyBuffer,params.import,false,['verify']).then(function(key){
    return crypto.subtle.verify(params.verify,key,signatureBytes,data);
  });
}
