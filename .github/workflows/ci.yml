name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go-version: ['1.23', '1.24']
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: ${{ matrix.go-version }}
          cache: false

      - name: Run tests with coverage
        run: |
          go test ./... -race -coverprofile=coverage.out -covermode=atomic
          TOTAL=$(go tool cover -func=coverage.out | grep total: | awk '{print $NF}' | tr -d '%')
          echo "### Test Coverage: ${TOTAL}%" >> $GITHUB_STEP_SUMMARY
          echo "Total coverage: ${TOTAL}%"
          TOTAL_INT=$(echo "$TOTAL" | awk '{printf "%d", $1 * 10}')
          if [ "$TOTAL_INT" -lt "800" ]; then
            echo "::error::Coverage ${TOTAL}% is below minimum 80%"
            exit 1
          fi

      - name: Build
        run: go build -ldflags "-s -w" ./cmd/jwx

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: false

      - uses: golangci/golangci-lint-action@v7

  security:
    name: Security
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: '1.24'
          cache: false

      - name: Run govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...
